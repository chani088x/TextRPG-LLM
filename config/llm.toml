[llm]
backend = "ollama"
endpoint = "http://localhost:11434"
api_path = "/api/chat"
model = "0xIbra/supergemma4-26b-uncensored-gguf-v2:Q4_K_M"
temperature = 0.7
stream = false
# Ollama API의 think=false는 CLI의 /set nothink와 같은 의미다.
think = false
connection_timeout_seconds = 10
read_timeout_seconds = 300

[prompt]
max_recent_events = 5
max_choices = 4
language = "ko"

[validation]
max_monster_hp = 200
max_monster_attack = 30
max_monster_defense = 20
max_hp_delta = 30
max_gold_reward = 100
max_exp_reward = 50

[debug]
log_prompt = true
log_raw_response = true
log_validation_error = true
